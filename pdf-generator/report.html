<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Leak Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Raleway:400,400i,500,500i,600,600i,700,700i');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Raleway", sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #545454;
            max-width: 46em;
            margin: 2em auto;
            padding: 1.6em 3.15em;
            background-color: #fff;
        }
        
        
        .background-image {
            position: fixed;
            top: 0;
            right: 0;
            width: auto;
            height: auto;
            max-width: 900px;
            z-index: -1;
            opacity: 1;
        }
        
        
        h1 {
            font-family: "Raleway", sans-serif;
            font-weight: 700;
            color: #333;
            font-size: 1.6em;
            line-height: 1.3;
            margin-bottom: 0.8em;
        }
        
        h2 {
            font-family: "Raleway", sans-serif;
            font-weight: 600;
            color: #333;
            font-size: 1.3em;
            margin-top: 2em;
            margin-bottom: 0.6em;
        }
        
        p {
            margin-bottom: 1.5em;
        }
        
        code {
            display: inline;
            background: #fcfcfc;
            border: 1px solid #dedede;
            border-radius: 0.3em;
            padding: 0.2em 0.5em;
            font-family: "Fira Code Retina", monospace;
            font-size: 0.85em;
        }
        
        .snippet {
            display: inline-block;
            border: 1px solid;
            border-radius: 0.3em;
            padding: 0.2em 0.5em;
            font-family: "Fira Code Retina", monospace;
            font-size: 0.85em;
            margin: 0.5em 0;
        }
        
        .finding {
            margin-bottom: 1.5em;
        }
        
        .finding-desc {
            margin-bottom: 0.5em;
        }
        
        .finding-desc code {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 1em;
        }
        
        hr {
            height: 1px;
            border: 0;
            background-color: #dedede;
            margin: 1.5em 0;
        }
        
        .summary {
            background: #f9f9f9;
            padding: 1em;
            border-radius: 0.5em;
            margin-bottom: 1.5em;
        }
        
        .summary ul {
            list-style: none;
            margin: 0;
        }
        
        .summary li {
            margin-bottom: 0.5em;
        }
    </style>
</head>
